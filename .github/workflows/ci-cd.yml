name: CI-CD Pipeline

on:
  push:
    branches:
      - main

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u $DOCKER_USERNAME --password-stdin

      # BACKEND
      - name: Build Backend Image
        run: |
          docker build \
          -f ./BACKEND/dockerfile.yml \
          -t $DOCKER_USERNAME/tm_backend:latest \
          ./BACKEND

      - name: Push Backend Image
        run: docker push $DOCKER_USERNAME/tm_backend:latest

      # FRONTEND
      - name: Build Frontend Image
        run: |
          docker build \
          -f ./FRONTEND/TM.Frontend/dockerfile.yml \
          -t $DOCKER_USERNAME/tm_frontend:latest \
          ./FRONTEND/TM.Frontend

      - name: Push Frontend Image
        run: docker push $DOCKER_USERNAME/tm_frontend:latest

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push

    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd TaskManager

            echo "🚀 Pulling latest images..."
            docker pull $DOCKER_USERNAME/tm_backend:latest
            docker pull $DOCKER_USERNAME/tm_frontend:latest

            echo "🧹 Cleaning old containers..."
            docker compose down

            echo "📦 Starting containers..."
            docker compose up -d

            echo "✅ Deployment finished!"