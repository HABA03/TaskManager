services: 

  frontend:
    container_name: tm_frontend
    image: haba63/tm_frontend:latest
    ports:
      - "80:80"
    networks:
      - tm_network
    depends_on:
      - backend
    restart: always

  backend: 
    container_name: tm_backend
    image: haba63/tm_backend:latest
    ports:
      - "5000:80"
    networks: 
      - tm_network
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:80"
      ConnectionStrings__DefaultConnection: "Server=database;Database=tm_db;User Id=sa;Password=${SA_PASSWORD};Encrypt=True;TrustServerCertificate=true;"
    depends_on:
      - database
    restart: always

  database: 
    container_name: tm_database
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${SA_PASSWORD}"
    volumes:
      - tm_sql_data:/var/opt/mssql
    networks:
      - tm_network
    restart: always

volumes:
  tm_sql_data:

networks:
  tm_network:
    driver: bridge